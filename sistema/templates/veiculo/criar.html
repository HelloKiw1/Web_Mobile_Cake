{% extends "../base.html" %}

{% block titulo %} Cadastrar Veículo {% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Cadastrar Veículo</h1>
    
    <form action="/veiculo/novo/" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="row">
            {% for field in form %}
                <div class="col-md-6 mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label font-weight-bold">{{ field.label }}</label>
                    <div class="input-group">
                        {{ field }}
                    </div>

                    {% if field.errors %}
                        <div class="alert alert-danger mt-2">
                            {% for error in field.errors %}
                                <p class="mb-0">{{ error }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary btn-lg w-50">Cadastrar</button>
        </div>
    </form>
</div>
{% endblock %}
