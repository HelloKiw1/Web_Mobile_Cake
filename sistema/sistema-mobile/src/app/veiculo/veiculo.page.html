<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>
      <a class="navbar-brand" href="#">
        <img src="assets/img/logo1.svg" alt="Logo" class="logo-small" style="max-height: 40px;"/>
      </a>
    </ion-title>

    <ion-buttons slot="end">
      <ion-label>
        <h3>{{ usuario.nome }}</h3>
      </ion-label>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Desenvolvimento webmobile</ion-card-title>
      <ion-card-subtitle>Aplicativo veículos</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item-sliding *ngFor="let veiculo of lista_veiculos">
          <ion-item>
            <ion-thumbnail slot="start">
              <img *ngIf="veiculo.foto" [src]="'data:image/jpeg;base64,' + veiculo.foto" />
              <img *ngIf="!veiculo.foto" src="../../assets/imgs/thumbnail.svg" />
            </ion-thumbnail>
            <ion-label>
              <h2>{{ veiculo.marca_display }} {{ veiculo.modelo | uppercase }}</h2>
              <p>{{ veiculo.cor_display }} | {{ veiculo.combustivel_display }}</p>
            </ion-label>
            <ion-label slot="end" color="primary">
              <h3>{{ veiculo.ano }}</h3>
            </ion-label>
          </ion-item>
          <ion-item-options>
            <ion-item-option color="danger" (click)="excluirveiculo(veiculo.id)">
              <ion-icon slot="start" name="trash"></ion-icon>
              Excluir
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
